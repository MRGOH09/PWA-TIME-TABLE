<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0f172a" />
<meta name="color-scheme" content="dark" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="补习课表" />
<title>周补习时间表 Dashboard</title>
<link rel="icon" href="/icons/icon-192.png" type="image/png" />
<link rel="manifest" href="/manifest.json" />
<link rel="apple-touch-icon" href="/icons/icon-192.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700&display=swap">
<style>
  :root {
    --bg: #0f172a;
    --panel: #1e293b;
    --panel-2: #273449;
    --border: #334155;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --accent: #38bdf8;

    --status-unmarked: #94a3b8;
    --status-low: #ef4444;
    --status-mid: #f59e0b;
    --status-high: #10b981;
    --status-full: #38bdf8;

    --level-secondary: #38bdf8;
    --level-primary: #fbbf24;

    --label-col-w: 160px;
    --minute-w: 1.4px;
    --hour-w: calc(var(--minute-w) * 60);
    --row-h: 60px;
    --axis-h: 32px;
    --axis-start: 480;
    --axis-end: 1320;
    --axis-span: 840;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    /* Noto Sans SC is a real web font from Google so the browser can
       embed it in print PDFs reliably. local PingFang SC would not
       embed via Chrome's macOS print pipeline. */
    font-family: -apple-system, BlinkMacSystemFont, "Noto Sans SC",
                 "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  header.top {
    padding: 16px 20px 8px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }
  header.top h1 { margin: 0; font-size: 20px; }
  header.top p { margin: 4px 0 0; color: var(--muted); font-size: 13px; }
  header.top .meta { color: var(--muted); font-size: 12px; margin-top: 4px; }
  header.top .top-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
  }
  #export-pdf-btn {
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
  }
  #install-pwa-btn {
    display: none;
    background: var(--accent);
    color: #0b1220;
    border: 1px solid var(--accent);
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
  }
  #export-pdf-btn:hover {
    background: var(--accent);
    color: #0b1220;
    border-color: var(--accent);
  }
  .top-actions {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .auth-chip {
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 7px 10px;
    font-size: 12px;
    white-space: nowrap;
  }
  .auth-chip.ok { color: #bbf7d0; border-color: rgba(16,185,129,0.5); }
  .auth-chip.warn { color: #fecaca; border-color: rgba(239,68,68,0.5); }
  .auth-chip button {
    margin-left: 6px;
    border: 0;
    background: transparent;
    color: inherit;
    cursor: pointer;
    font: inherit;
    padding: 0;
  }

  .tabs {
    display: flex;
    gap: 4px;
    padding: 8px 20px 0;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    overflow-x: auto;
  }
  .tabs button {
    background: transparent;
    color: var(--muted);
    border: 0;
    border-bottom: 2px solid transparent;
    padding: 10px 16px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border-radius: 6px 6px 0 0;
    white-space: nowrap;
  }
  .tabs button.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
    background: rgba(56,189,248,0.06);
  }
  .tabs button:hover:not(.active) { color: var(--text); }

  .filters {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 12px 20px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    align-items: flex-end;
  }
  .filters label {
    display: flex;
    flex-direction: column;
    font-size: 11px;
    color: var(--muted);
    gap: 4px;
  }
  .filters select,
  .filters input[type="search"] {
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 8px;
    font-size: 13px;
    min-width: 110px;
  }
  .filters input[type="search"] { min-width: 160px; }
  .filters .spacer { flex: 1; }
  .filters button {
    background: var(--accent);
    color: #0b1220;
    border: 0;
    border-radius: 6px;
    padding: 8px 14px;
    font-weight: 600;
    cursor: pointer;
    font-size: 13px;
  }
  .filters button.secondary {
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
  }

  .summary {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 8px;
    padding: 12px 20px;
  }
  .summary .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
  }
  .summary .card .label { font-size: 11px; color: var(--muted); }
  .summary .card .value { font-size: 22px; font-weight: 700; margin-top: 2px; }
  .summary .card.full .value { color: var(--status-full); }
  .summary .card.high .value { color: var(--status-high); }
  .summary .card.mid .value { color: var(--status-mid); }
  .summary .card.low .value { color: var(--status-low); }
  .summary .card.unmarked .value { color: var(--status-unmarked); }

  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    padding: 0 20px 8px;
    color: var(--muted);
    font-size: 12px;
  }
  .legend .dot {
    display: inline-block;
    width: 10px; height: 10px;
    border-radius: 2px;
    margin-right: 4px;
    vertical-align: middle;
  }

  .gantt-wrapper {
    padding: 0 12px 24px;
  }
  .branch-block {
    margin-bottom: 18px;
  }
  .branch-title {
    padding: 10px 14px;
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px 10px 0 0;
    border-bottom: none;
  }
  .branch-title .small {
    color: var(--muted);
    font-weight: 500;
    font-size: 12px;
    margin-left: 8px;
  }

  .gantt {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 0 0 10px 10px;
    overflow: hidden;
    display: grid;
    grid-template-columns: var(--label-col-w) 1fr;
  }
  .gantt.solo { border-radius: 10px; }

  .mobile-schedule-list {
    display: none;
  }
  .mobile-day-block {
    margin-top: 10px;
  }
  .mobile-day-heading {
    color: var(--muted);
    font-size: 12px;
    font-weight: 700;
    padding: 8px 2px 6px;
  }
  .mobile-slot-card {
    appearance: none;
    font: inherit;
    width: 100%;
    text-align: left;
    color: var(--text);
    background: var(--panel);
    border: 1px solid var(--border);
    border-left-width: 5px;
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 8px;
    cursor: pointer;
    box-shadow: 0 8px 18px rgba(2,6,23,0.16);
  }
  .mobile-slot-card:active {
    transform: scale(0.99);
  }
  .mobile-slot-card.full { border-left-color: var(--status-full); }
  .mobile-slot-card.high { border-left-color: var(--status-high); }
  .mobile-slot-card.mid { border-left-color: var(--status-mid); }
  .mobile-slot-card.low { border-left-color: var(--status-low); }
  .mobile-slot-card.unmarked { border-left-color: var(--status-unmarked); }
  .mobile-slot-card .slot-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
  }
  .mobile-slot-card .slot-time {
    color: var(--accent);
    font-size: 13px;
    font-weight: 800;
    white-space: nowrap;
    font-variant-numeric: tabular-nums;
  }
  .mobile-slot-card .slot-rate {
    color: var(--text);
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 2px 8px;
    font-size: 11px;
    font-weight: 700;
    white-space: nowrap;
  }
  .mobile-slot-card .slot-main {
    font-size: 16px;
    font-weight: 800;
    line-height: 1.25;
    margin-top: 8px;
  }
  .mobile-slot-card .slot-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
    color: var(--muted);
    font-size: 12px;
  }
  .mobile-slot-card .slot-meta span {
    background: rgba(148,163,184,0.12);
    border: 1px solid rgba(148,163,184,0.18);
    border-radius: 999px;
    padding: 2px 7px;
  }

  .gantt-labels {
    border-right: 1px solid var(--border);
    background: var(--panel-2);
    overflow: hidden;
  }
  .gantt-labels .axis-spacer {
    height: var(--axis-h);
    border-bottom: 1px solid var(--border);
  }
  .gantt-labels .row-label {
    padding: 8px 12px;
    font-size: 13px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    color: var(--accent);
    font-weight: 700;
    background: rgba(56,189,248,0.06);
  }

  .gantt-timeline-wrap {
    overflow-x: auto;
    overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
  }
  .gantt-timeline {
    width: calc(var(--axis-span) * var(--minute-w));
    min-width: 100%;
  }

  .axis {
    height: var(--axis-h);
    position: relative;
    border-bottom: 1px solid var(--border);
    background: var(--panel-2);
  }
  .axis .tick {
    position: absolute;
    top: 0;
    bottom: 0;
    border-left: 1px solid var(--border);
    padding: 6px 4px 0;
    font-size: 11px;
    color: var(--muted);
  }

  .row {
    position: relative;
    border-bottom: 1px solid var(--border);
    background-image: linear-gradient(to right, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: var(--hour-w) 100%;
  }

  .bar {
    position: absolute;
    left: 0;
    border-radius: 6px;
    padding: 4px 6px;
    font-size: 11px;
    line-height: 1.2;
    color: #0b1220;
    cursor: pointer;
    overflow: hidden;
    border: 1px solid rgba(0,0,0,0.2);
    box-shadow: 0 1px 2px rgba(0,0,0,0.4);
    display: flex;
    flex-direction: column;
    justify-content: center;
    transition: transform 0.08s ease, box-shadow 0.08s ease;
  }
  .bar:hover {
    transform: translateY(-1px);
    box-shadow: 0 3px 8px rgba(0,0,0,0.5);
  }
  .bar .l1 { font-weight: 800; font-size: 12px; }
  .bar .l2 { font-weight: 600; opacity: 0.92; }
  .bar .l3 { font-size: 10px; opacity: 0.86; }
  .bar.unmarked { background: var(--status-unmarked); }
  .bar.low { background: var(--status-low); color: #fff; }
  .bar.mid { background: var(--status-mid); }
  .bar.high { background: var(--status-high); color: #fff; }
  .bar.full { background: var(--status-full); }

  .bar .att-badge {
    display: inline-block;
    margin-top: 2px;
    padding: 1px 4px;
    background: rgba(0,0,0,0.25);
    color: #fff;
    border-radius: 3px;
    font-size: 9px;
    font-weight: 700;
    align-self: flex-start;
  }

  /* Modal */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(2,6,23,0.7);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 16px;
    z-index: 50;
  }
  .modal-backdrop.show { display: flex; }
  .modal {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
    max-width: 560px;
    width: 100%;
    max-height: 85vh;
    overflow: auto;
  }
  .modal.wide { max-width: 1100px; }

  .matrix-toolbar {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    margin: 8px 0 4px;
    font-size: 12px;
    color: var(--muted);
  }
  .matrix-toggle {
    display: inline-flex;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  .matrix-toggle button {
    background: var(--panel-2);
    color: var(--muted);
    border: 0;
    padding: 5px 12px;
    font-size: 12px;
    cursor: pointer;
    border-right: 1px solid var(--border);
  }
  .matrix-toggle button:last-child { border-right: 0; }
  .matrix-toggle button.active {
    background: var(--accent);
    color: #0b1220;
    font-weight: 700;
  }

  .month-matrix-wrap {
    overflow-x: auto;
    margin-top: 8px;
    border: 1px solid var(--border);
    border-radius: 8px;
  }
  table.month-matrix {
    border-collapse: collapse;
    font-size: 11px;
    white-space: nowrap;
    width: 100%;
    background: var(--panel);
  }
  table.month-matrix th,
  table.month-matrix td {
    padding: 5px 8px;
    border-bottom: 1px solid var(--border);
    border-right: 1px solid var(--border);
    text-align: left;
    font-variant-numeric: tabular-nums;
  }
  table.month-matrix .num { text-align: right; }
  table.month-matrix thead th {
    background: var(--panel-2);
    color: var(--muted);
    font-weight: 600;
    position: sticky;
    top: 0;
    z-index: 1;
  }
  table.month-matrix tbody td.cell-empty { color: var(--muted); }
  table.month-matrix tbody td.cell-unmarked {
    background: var(--panel-2);
    color: var(--muted);
  }
  table.month-matrix tbody td.cell-full { background: rgba(56,189,248,0.22); color: #f1f5f9; font-weight: 600; }
  table.month-matrix tbody td.cell-high { background: rgba(16,185,129,0.22); color: #f1f5f9; font-weight: 600; }
  table.month-matrix tbody td.cell-mid  { background: rgba(245,158,11,0.22); color: #f1f5f9; font-weight: 600; }
  table.month-matrix tbody td.cell-low  { background: rgba(239,68,68,0.28);  color: #fff; font-weight: 700; }
  table.month-matrix tbody td.cell-contrib {
    font-weight: 700;
  }
  table.month-matrix tbody td.contrib-new {
    background: rgba(56,189,248,0.18);
    color: #bae6fd;
  }
  table.month-matrix tbody td.contrib-flat {
    background: rgba(148,163,184,0.20);
    color: #cbd5e1;
  }
  table.month-matrix tbody td.contrib-up {
    background: rgba(16,185,129,0.28);
    color: #d1fae5;
  }
  table.month-matrix tbody td.contrib-down {
    background: rgba(239,68,68,0.26);
    color: #fee2e2;
  }
  table.month-matrix tbody td.contrib-total {
    background: rgba(245,158,11,0.18);
    color: #fde68a;
  }
  table.month-matrix tbody tr:hover td:not(.cell-empty):not(.cell-unmarked) {
    filter: brightness(1.15);
  }

  .trend-up   { color: var(--status-high); font-weight: 700; }
  .trend-down { color: var(--status-low);  font-weight: 700; }
  .trend-flat { color: var(--muted); }

  .matrix-hint {
    color: var(--muted);
    font-size: 11px;
    margin-top: 6px;
    line-height: 1.5;
  }
  .modal h2 {
    margin: 0 0 4px;
    font-size: 16px;
  }
  .modal h3 {
    margin: 14px 0 6px;
    font-size: 13px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .modal dl {
    display: grid;
    grid-template-columns: 90px 1fr;
    gap: 4px 8px;
    margin: 0;
    font-size: 13px;
  }
  .modal dt { color: var(--muted); }
  .modal dd { margin: 0; }
  .modal table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  .modal table th,
  .modal table td {
    padding: 4px 6px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }
  .modal table th {
    color: var(--muted);
    font-weight: 600;
  }
  .modal .actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 14px;
  }
  .modal button {
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 8px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
  }
  .modal button.primary {
    background: var(--accent);
    color: #0b1220;
    border-color: var(--accent);
    font-weight: 700;
  }

  .filters select,
  .filters input[type="search"],
  button {
    touch-action: manipulation;
  }

  .pill {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 700;
    margin-right: 6px;
  }
  .pill.secondary-level { background: var(--level-secondary); color: #0b1220; }
  .pill.primary-level { background: var(--level-primary); color: #0b1220; }
  .pill.branch { background: var(--panel-2); color: var(--text); border: 1px solid var(--border); }

  .clickable-name {
    color: var(--accent);
    cursor: pointer;
    text-decoration: underline dotted;
  }

  /* Teachers view */
  .teacher-table-wrap,
  .heatmap-wrap,
  .underperf-wrap {
    padding: 0 20px 24px;
    overflow-x: auto;
  }
  table.data {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  table.data th,
  table.data td {
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
    text-align: left;
  }
  table.data thead th {
    background: var(--panel-2);
    color: var(--muted);
    font-size: 12px;
    cursor: pointer;
    user-select: none;
  }
  table.data thead th.sorted { color: var(--accent); }
  table.data tr:hover td { background: rgba(56,189,248,0.04); }
  table.data tr.clickable { cursor: pointer; }
  table.data .num { text-align: right; font-variant-numeric: tabular-nums; }
  table.data .barcell {
    padding: 4px 10px;
    width: 140px;
  }
  table.data .barcell .pct-bar {
    height: 10px;
    border-radius: 4px;
    background: rgba(255,255,255,0.06);
    position: relative;
    overflow: hidden;
  }
  table.data .barcell .pct-bar > span {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    background: var(--accent);
  }

  .heatmap {
    display: grid;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    font-size: 12px;
  }
  .heatmap .hcell {
    padding: 6px 8px;
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    text-align: center;
    color: var(--text);
  }
  .heatmap .hcell.head {
    background: var(--panel-2);
    font-weight: 700;
    color: var(--muted);
  }
  .heatmap .hcell.name {
    text-align: left;
    color: var(--accent);
    cursor: pointer;
    background: rgba(56,189,248,0.04);
    font-weight: 600;
  }
  .heatmap .hcell.empty {
    color: var(--muted);
    background: var(--panel-2);
  }

  /* Subject view */
  .subject-section-title {
    padding: 0 20px;
    margin: 18px 0 8px;
    font-size: 14px;
    font-weight: 700;
    color: var(--accent);
    border-left: 3px solid var(--accent);
    padding-left: 12px;
    margin-left: 20px;
  }
  .subject-section-title.primary {
    color: var(--level-primary);
    border-left-color: var(--level-primary);
  }
  .subject-section-title .small {
    color: var(--muted);
    font-weight: 500;
    font-size: 12px;
    margin-left: 8px;
  }
  table.data .col-key {
    font-weight: 700;
    color: var(--text);
  }
  table.data .col-trend {
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }
  table.data tbody tr.agg-row td {
    background: var(--panel-2);
    font-weight: 700;
    border-top: 2px solid var(--accent);
  }

  .subject-trend-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    margin: 12px 0;
  }
  .subject-trend-card svg {
    width: 100%;
    height: 160px;
    display: block;
  }

  .issue-summary {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 8px;
    margin: 8px 0 10px;
  }
  .issue-card {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
  }
  .issue-card span {
    display: block;
    color: var(--muted);
    font-size: 11px;
    margin-bottom: 2px;
  }
  .issue-card b {
    display: block;
    font-size: 18px;
    line-height: 1.2;
    color: var(--text);
  }
  .issue-card.low { border-color: rgba(239,68,68,0.55); }
  .issue-card.low b { color: var(--status-low); }
  .issue-card.unmarked { border-color: rgba(148,163,184,0.55); }
  .issue-card.unmarked b { color: var(--status-unmarked); }
  .issue-card.good { border-color: rgba(16,185,129,0.45); }
  .issue-card.good b { color: var(--status-high); }
  .issue-table td.cell-low,
  .issue-table td.cell-unmarked {
    font-weight: 700;
  }
  .issue-subtitle {
    margin: 10px 0 4px;
    font-size: 12px;
    color: var(--text);
  }
  .issue-subtitle span {
    color: var(--muted);
    font-weight: 500;
    margin-left: 6px;
  }

  /* Attendance view */
  .attendance-controls {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    padding: 12px 20px;
    align-items: flex-end;
  }
  .attendance-charts {
    display: grid;
    grid-template-columns: 1fr;
    gap: 16px;
    padding: 0 20px 16px;
  }
  @media (min-width: 960px) {
    .attendance-charts { grid-template-columns: 1fr 1fr; }
  }
  .chart-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
  }
  .chart-card h3 {
    margin: 0 0 8px;
    font-size: 13px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .chart-svg {
    width: 100%;
    height: 240px;
    display: block;
  }
  .chart-legend {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
  }
  .chart-legend .dot {
    display: inline-block;
    width: 10px; height: 10px;
    border-radius: 2px;
    margin-right: 4px;
    vertical-align: middle;
  }

  .empty-msg {
    padding: 40px 20px;
    text-align: center;
    color: var(--muted);
    font-size: 14px;
  }

  .print-header {
    display: none;
  }

  /* Print / PDF — clean light layout for paper / "Save as PDF" */
  @media print {
    @page { size: A4 landscape; margin: 10mm; }

    :root {
      --bg: #ffffff;
      --panel: #ffffff;
      --panel-2: #f3f4f6;
      --border: #d1d5db;
      --text: #111827;
      --muted: #4b5563;
    }

    /* Use the Google-hosted Noto Sans SC for CJK so Chrome can embed
       the font in the printed PDF. Local PingFang SC silently fails to
       embed via the macOS print pipeline, leaving Chinese as blank glyphs. */
    body {
      background: white !important;
      color: black !important;
      font-family: -apple-system, BlinkMacSystemFont, "Noto Sans SC",
                   "PingFang SC", "Microsoft YaHei", sans-serif !important;
    }

    /* Print header injected at the top of the active view / modal so the
       PDF actually identifies what it is. */
    .print-header {
      display: block !important;
      padding: 0 0 10px 0;
      margin: 0 0 12px 0;
      border-bottom: 2px solid #d1d5db;
    }
    .print-header .h-title {
      font-size: 14pt;
      font-weight: 700;
      color: #111827;
      margin: 0 0 2px 0;
    }
    .print-header .h-sub {
      font-size: 10pt;
      color: #4b5563;
    }

    /* When a per-view summary is showing, hide the top-level project summary
       to avoid duplicate card rows. */
    body.print-hide-top-summary > #summary { display: none !important; }

    /* Modal-only print mode — dashboard fades out and only the modal prints.
       Used by the per-teacher / per-subject export buttons inside the modal. */
    body.print-modal-only > *:not(#modal-root) { display: none !important; }
    body.print-modal-only #modal-root {
      position: static !important;
      background: transparent !important;
      display: block !important;
      padding: 0 !important;
      inset: auto !important;
    }
    body.print-modal-only #modal-content {
      max-width: none !important;
      width: 100% !important;
      max-height: none !important;
      overflow: visible !important;
      background: white !important;
      color: black !important;
      border: none !important;
      box-shadow: none !important;
      padding: 0 !important;
    }
    body.print-modal-only .actions { display: none !important; }

    /* Hide chrome that does not belong on paper */
    .tabs,
    .filters,
    .modal-backdrop,
    #export-pdf-btn,
    .matrix-toolbar,
    .legend,
    .attendance-controls,
    .actions { display: none !important; }

    header.top { border: none; padding: 8px 0; }
    header.top h1 { font-size: 16pt; }
    header.top p, header.top .meta { font-size: 9pt; color: #4b5563; }

    /* Force browsers to print background colors so the cell-status
       tints actually show up in the PDF. */
    * {
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
      color-adjust: exact !important;
    }

    /* Show only the active view */
    .view { display: none !important; }
    .view.print-active { display: block !important; }

    /* Don't clip wide content */
    .month-matrix-wrap,
    .teacher-table-wrap,
    .gantt-timeline-wrap,
    .heatmap-wrap,
    .underperf-wrap { overflow: visible !important; }

    /* Tables / cards: white background, dark text */
    .summary .card,
    table.data,
    table.month-matrix,
    .gantt,
    .branch-title,
    .subject-trend-card,
    .chart-card {
      background: white !important;
      color: black !important;
      border-color: #d1d5db !important;
      box-shadow: none !important;
    }
    table.data thead th,
    table.month-matrix thead th {
      background: #f3f4f6 !important;
      color: #1f2937 !important;
    }

    /* Cell tints — keep visible but lighter for ink */
    table.month-matrix tbody td.cell-empty { color: #6b7280 !important; }
    table.month-matrix tbody td.cell-unmarked { background: #f3f4f6 !important; color: #6b7280 !important; }
    table.month-matrix tbody td.cell-full { background: #dbeafe !important; color: #0c4a6e !important; }
    table.month-matrix tbody td.cell-high { background: #d1fae5 !important; color: #065f46 !important; }
    table.month-matrix tbody td.cell-mid  { background: #fef3c7 !important; color: #78350f !important; }
    table.month-matrix tbody td.cell-low  { background: #fee2e2 !important; color: #7f1d1d !important; }
    table.month-matrix tbody td.contrib-new { background: #e0f2fe !important; color: #075985 !important; }
    table.month-matrix tbody td.contrib-flat { background: #f1f5f9 !important; color: #334155 !important; }
    table.month-matrix tbody td.contrib-up { background: #d1fae5 !important; color: #065f46 !important; }
    table.month-matrix tbody td.contrib-down { background: #fee2e2 !important; color: #7f1d1d !important; }
    table.month-matrix tbody td.contrib-total { background: #fef3c7 !important; color: #78350f !important; }

    /* Page break hints */
    .branch-block,
    .subject-section-title,
    .chart-card,
    h3 { page-break-inside: avoid; break-inside: avoid; }

    /* Bars on the Gantt: solid darker colors so they show in print */
    .bar.unmarked { background: #9ca3af !important; color: #111827 !important; }
    .bar.low      { background: #dc2626 !important; color: #fff !important; }
    .bar.mid      { background: #d97706 !important; color: #fff !important; }
    .bar.high     { background: #059669 !important; color: #fff !important; }
    .bar.full     { background: #2563eb !important; color: #fff !important; }

    /* Trend arrows */
    .trend-up   { color: #059669 !important; }
    .trend-down { color: #dc2626 !important; }
    .trend-flat { color: #6b7280 !important; }
  }

  /* Mobile tweaks */
  @media (max-width: 720px) {
    :root {
      --label-col-w: 110px;
      --minute-w: 1.2px;
      --row-h: 64px;
    }
    body {
      padding-bottom: calc(70px + env(safe-area-inset-bottom));
    }
    header.top {
      padding: calc(12px + env(safe-area-inset-top)) 12px 10px;
    }
    header.top h1 { font-size: 18px; }
    header.top p { display: none; }
    header.top .top-row {
      flex-direction: column;
      gap: 10px;
    }
    .top-actions {
      width: 100%;
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 2px;
    }
    .auth-chip,
    #export-pdf-btn,
    #install-pwa-btn {
      min-height: 38px;
      padding: 9px 12px;
      font-size: 12px;
    }
    .tabs {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 40;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 0;
      padding: 6px 6px calc(6px + env(safe-area-inset-bottom));
      border-top: 1px solid var(--border);
      border-bottom: 0;
      box-shadow: 0 -12px 30px rgba(2,6,23,0.34);
      overflow: visible;
    }
    .tabs button {
      min-width: 0;
      padding: 9px 4px;
      border: 0;
      border-radius: 8px;
      font-size: 11px;
      line-height: 1.2;
      white-space: normal;
    }
    .tabs button.active {
      color: #0b1220;
      background: var(--accent);
    }
    .filters {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      padding: 10px 12px;
      align-items: stretch;
    }
    .filters label {
      min-width: 0;
    }
    .filters select,
    .filters input[type="search"] {
      width: 100%;
      min-width: 0;
      min-height: 40px;
      font-size: 14px;
    }
    .filters .spacer {
      display: none;
    }
    .filters button {
      grid-column: 1 / -1;
      min-height: 40px;
    }
    .summary {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      padding: 10px 12px;
    }
    .summary .card {
      padding: 8px 10px;
    }
    .summary .card .value {
      font-size: 18px;
      overflow-wrap: anywhere;
    }
    .legend {
      padding: 0 12px 10px;
      gap: 8px;
      font-size: 11px;
    }
    .gantt-wrapper { padding: 0 8px 20px; }
    .branch-block { margin-bottom: 12px; }
    .branch-title {
      border-radius: 8px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 8px;
      position: sticky;
      top: 0;
      z-index: 3;
    }
    .gantt {
      display: none;
    }
    .mobile-schedule-list {
      display: block;
    }
    .bar .l3 { display: none; }
    .teacher-table-wrap,
    .heatmap-wrap,
    .underperf-wrap {
      padding: 0 8px 18px;
    }
    .subject-section-title {
      margin-left: 8px;
      padding-right: 8px;
    }
    table.data,
    table.month-matrix {
      min-width: 720px;
      font-size: 12px;
    }
    table.data th,
    table.data td,
    table.month-matrix th,
    table.month-matrix td {
      padding: 7px 8px;
    }
    .attendance-controls {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      padding: 10px 12px;
    }
    .attendance-controls label,
    .attendance-controls select {
      width: 100%;
      min-width: 0;
    }
    .attendance-charts {
      padding: 0 8px 12px;
      gap: 10px;
    }
    .chart-card {
      padding: 10px;
    }
    .chart-svg {
      height: 200px;
    }
    .modal-backdrop {
      align-items: flex-end;
      padding: 8px 8px 0;
    }
    .modal {
      max-height: 92dvh;
      border-radius: 14px 14px 0 0;
      padding: 16px 14px calc(16px + env(safe-area-inset-bottom));
    }
    .modal.wide {
      max-width: 100%;
    }
    .modal dl {
      grid-template-columns: 86px 1fr;
    }
    .modal .actions {
      position: sticky;
      bottom: 0;
      background: linear-gradient(to top, var(--panel) 70%, rgba(30,41,59,0));
      padding-top: 12px;
    }
  }
</style>
</head>
<body>

<header class="top">
  <div class="top-row">
    <div>
      <h1>周补习时间表 Dashboard</h1>
      <p>查看每个分行、每个礼拜、每位老师的课表与出勤表现</p>
      <div class="meta" id="meta">数据加载中…</div>
    </div>
    <div class="top-actions">
      <div id="auth-status" class="auth-chip">检查登录…</div>
      <button id="install-pwa-btn" type="button">安装</button>
      <button id="export-pdf-btn" type="button" title="把当前 view 打印 / 另存为 PDF">导出 PDF</button>
    </div>
  </div>
</header>

<nav class="tabs" id="tabs">
  <button data-view="gantt" class="active">周课表 Gantt</button>
  <button data-view="teachers">老师科数表现</button>
  <button data-view="subjects">全体科目表现</button>
  <button data-view="attendance">出勤表现</button>
</nav>

<section class="filters" id="filters">
  <label>分行
    <select id="f-branch"><option value="">全部</option></select>
  </label>
  <label>中小
    <select id="f-level">
      <option value="">全部</option>
      <option value="中学">中学</option>
      <option value="小学">小学</option>
    </select>
  </label>
  <label>礼拜
    <select id="f-day"><option value="">全部</option></select>
  </label>
  <label>科目
    <select id="f-subject"><option value="">全部</option></select>
  </label>
  <label>年纪
    <select id="f-grade"><option value="">全部</option></select>
  </label>
  <label>老师
    <select id="f-teacher"><option value="">全部</option></select>
  </label>
  <label>月份
    <select id="f-month"><option value="">全部</option></select>
  </label>
  <label data-view-only="gantt">出勤状态
    <select id="f-status">
      <option value="">全部</option>
      <option value="unmarked">未点名</option>
      <option value="full">全勤</option>
      <option value="high">高出勤</option>
      <option value="mid">中出勤</option>
      <option value="low">低出勤</option>
    </select>
  </label>
  <div class="spacer"></div>
  <button id="reset-filters" class="secondary" type="button">清除筛选</button>
</section>

<section class="summary" id="summary"></section>

<section class="legend" id="legend">
  <span><span class="dot" style="background:var(--status-full)"></span>全勤</span>
  <span><span class="dot" style="background:var(--status-high)"></span>高出勤 ≥80%</span>
  <span><span class="dot" style="background:var(--status-mid)"></span>中出勤 50–80%</span>
  <span><span class="dot" style="background:var(--status-low)"></span>低出勤 &lt;50%</span>
  <span><span class="dot" style="background:var(--status-unmarked)"></span>未点名</span>
</section>

<main>
  <section id="view-gantt" class="view">
    <div id="gantt-root" class="gantt-wrapper"></div>
  </section>

  <section id="view-teachers" class="view" style="display:none">
    <div id="teachers-summary" class="summary"></div>
    <div id="teachers-table-wrap" class="teacher-table-wrap"></div>
    <div id="teachers-heatmap-wrap" class="heatmap-wrap"></div>
  </section>

  <section id="view-subjects" class="view" style="display:none">
    <div id="subjects-summary" class="summary"></div>
    <div id="subjects-secondary-wrap" class="teacher-table-wrap"></div>
    <div id="subjects-primary-wrap" class="teacher-table-wrap"></div>
  </section>

  <section id="view-attendance" class="view" style="display:none">
    <div id="attendance-summary" class="summary"></div>
    <div class="attendance-controls">
      <label>横轴
          <select id="att-axis">
            <option value="month">月份</option>
            <option value="week">周次</option>
            <option value="day">礼拜</option>
            <option value="date">日期</option>
          </select>
      </label>
      <label>分组
        <select id="att-group">
          <option value="">无</option>
          <option value="branch">分行</option>
          <option value="level">中小</option>
          <option value="subject">科目</option>
          <option value="grade">年纪</option>
          <option value="teacher">老师</option>
        </select>
      </label>
      <label>矩阵维度
        <select id="att-matrix-dim">
          <option value="branch">分行</option>
          <option value="level">中小</option>
          <option value="subject">科目</option>
          <option value="grade">年纪</option>
          <option value="teacher">老师</option>
        </select>
      </label>
      <label>矩阵周期
        <select id="att-matrix-bucket">
          <option value="month">按月</option>
          <option value="week">按周</option>
        </select>
      </label>
      <label>矩阵指标
        <select id="att-matrix-metric">
          <option value="rate">出勤率</option>
          <option value="count">P/总</option>
          <option value="equivAbsent">A+N</option>
        </select>
      </label>
    </div>
    <div class="attendance-charts">
      <div class="chart-card">
        <h3>出勤率 趋势</h3>
        <svg class="chart-svg" id="att-line-svg"></svg>
        <div class="chart-legend" id="att-line-legend"></div>
      </div>
      <div class="chart-card">
        <h3>到课 vs 缺课 vs 未点名</h3>
        <svg class="chart-svg" id="att-stack-svg"></svg>
        <div class="chart-legend">
          <span><span class="dot" style="background:var(--status-high)"></span>到课</span>
          <span><span class="dot" style="background:var(--status-low)"></span>缺课</span>
          <span><span class="dot" style="background:var(--status-unmarked)"></span>未点名</span>
        </div>
      </div>
    </div>
    <div id="attendance-matrix-wrap" class="underperf-wrap"></div>
    <div id="attendance-issues-wrap" class="underperf-wrap"></div>
  </section>
</main>

<div class="modal-backdrop" id="modal-root">
  <div class="modal" id="modal-content"></div>
</div>

<script src="/js/gantt.js?v=3"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    });
  }
</script>
</body>
</html>
